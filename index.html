const sbFetch = async (path, method="GET", body=null) => {
  const opts = { method, headers: { "apikey": SB_KEY, "Authorization": "Bearer "+SB_KEY, "Content-Type": "application/json", "Prefer": "return=representation" } };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SB_URL+"/rest/v1/"+path, opts);
  if(!r.ok) return null;
  const text = await r.text();
  return text ? JSON.parse(text) : null;
};

                <div style={{fontSize:13,fontWeight:800,color:"#f97316",marginBottom:8}}>⚠️ {es?"PLANES POR VENCER":"PLANS EXPIRING SOON"}</div>

                  const r = routines.find(rt=>rt.alumnoId===a.id);
                  const days = Math.ceil((new Date(r.endDate)-new Date())/(1000*60*60*24));

                  const waMsg = encodeURIComponent("Hola "+a.nombre+"! Tu plan vence en "+days+" días, ¿renovamos? 💪");
                  return(
                    <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid #f9731622"}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700}}>{a.nombre}</div>
                        <div style={{fontSize:12,color:"#f97316"}}>{days===0?(es?"Vence hoy":"Expires today"):(es?"Vence en "+days+" día"+(days>1?"s":""):"Expires in "+days+" day"+(days>1?"s":""))}</div>
                      </div>
                      {tel&&<a href={"https://wa.me/549"+tel+"?text="+waMsg} target="_blank" style={{background:"#25D36622",color:"#25D366",textDecoration:"none",padding:"7px 13px",borderRadius:8,fontSize:13,fontWeight:700}}>💬 WA</a>}
                    </div>

                })}
              </div>
            );
          })()}

          {newAlumnoForm&&(
            <div style={{background:"#0e1018",border:"1px solid #2d3748",borderRadius:12,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:1,marginBottom:12,color:"#e2e8f0"}}>{es?"NUEVO ALUMNO":"NEW ATHLETE"}</div>
              <div style={{marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,color:"#4a5568",marginBottom:3,display:"block"}}>{es?"NOMBRE":"NAME"}</span>

              <div style={{marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,color:"#4a5568",marginBottom:3,display:"block"}}>{es?"EMAIL":"EMAIL"}</span>

              </div>
              <div style={{marginBottom:12}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,color:"#4a5568",marginBottom:3,display:"block"}}>{es?"CONTRASEÑA":"PASSWORD"}</span>
                <input style={{background:"#0a0c14",color:"#e2e8f0",border:"1px solid #1a1d2e",borderRadius:8,padding:"8px 12px",fontFamily:"DM Sans,sans-serif",fontSize:16,width:"100%",boxSizing:"border-box"}} value={newAlumnoData.pass} onChange={e=>setNewAlumnoData(p=>({...p,pass:e.target.value}))} placeholder="Contraseña" type="password"/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="hov" style={{background:"#1a1d2e",color:"#e2e8f0",border:"none",borderRadius:8,padding:"10px",flex:1,fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer"}} onClick={()=>{setNewAlumnoForm(false);setNewAlumnoData({nombre:"",email:"",pass:""});}}>{es?"CANCELAR":"CANCEL"}</button>
                <button className="hov" style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:8,padding:"10px",flex:2,fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer"}} onClick={async ()=>{
                  if(!newAlumnoData.nombre.trim()||!newAlumnoData.email.trim()) return;
                  setLoadingSB(true);
                  const res = await sb.createAlumno({nombre:newAlumnoData.nombre.trim(),email:newAlumnoData.email.trim(),password:newAlumnoData.pass||"irontrack123",entrenador_id:ENTRENADOR_ID});

                    setAlumnos(prev=>[...prev,res[0]]);
                    toast2(es?"Alumno creado: ":"Athlete created: "+newAlumnoData.nombre+" ✓");
                    setNewAlumnoForm(false);
                    setNewAlumnoData({nombre:"",email:"",pass:""});
                  } else { toast2("Error al crear alumno"); }
                  setLoadingSB(false);
                }}>GUARDAR</button>
              </div>
            </div>

            </div>

                    setRegistrosSubTab(0);
                    setLoadingSB(true);
                    const ruts = await sb.getRutinas(a.id);
                    setRutinasSB(ruts||[]);
                    const prog = await sb.getProgreso(a.id);
                    setAlumnoProgreso(prog||[]);
                    const ses = await sb.getSesiones(a.id);
                    setAlumnoSesiones(ses||[]);
                    setLoadingSB(false);

                      await sb.deleteAlumno?.(a.id);
                      setAlumnos(prev=>prev.filter(x=>x.id!==a.id));
                      toast2("Alumno eliminado");
                    }}>🗑</button>
                </div>
              </div>
              {alumnoActivo?.id===a.id&&(

                  {rutinasSB.map(r=>(
                    <div key={r.id} style={{background:"#13151f",borderRadius:10,padding:"12px",marginBottom:8,border:"1px solid #1a1d2e"}}>
                      <div style={{marginBottom:8}}>
                        <div style={{fontSize:15,fontWeight:800}}>{r.nombre}</div>
                        <div style={{fontSize:11,color:"#4a5568",marginTop:2}}>
                          {r.datos?.days?.length||0} dias · {r.created_at?new Date(r.created_at).toLocaleDateString("es-AR"):""}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <button className="hov" style={{background:"#60a5fa22",color:"#60a5fa",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={()=>{
                            const rutina={id:r.id,...(r.datos||{}),name:r.nombre,saved:true,alumno_id:a.id,alumno:a.nombre};
                            setRoutines(prev=>{const ex=prev.find(x=>x.id===r.id);return ex?prev.map(x=>x.id===r.id?rutina:x):[rutina,...prev];});
                            setTab("routines");
                            toast2(es?"Rutina abierta para editar en RUTINAS":"Routine opened for editing");
                          }}>{es?"✏️ Editar":"✏️ Edit"}</button>
                        <button className="hov" style={{background:"#a78bfa22",color:"#a78bfa",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={()=>{
                            const copia={...(r.datos||{}),id:"c_"+Date.now(),name:"Copia de "+r.nombre,created:new Date().toLocaleDateString("es-AR"),saved:false};
                            setRoutines(prev=>[copia,...prev]);
                            setTab("routines");
                            toast2(es?"Copia creada en RUTINAS":"Copy created in ROUTINES");
                          }}>{es?"📋 Copiar":"📋 Copy"}</button>
                        <button className="hov" style={{background:"#25d36622",color:"#25d366",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={async()=>{
                            const link=window.location.href.split("?")[0]+"?r="+btoa(JSON.stringify({...r.datos,id:r.id,alumnoId:a.id}));
                            if(navigator.share){navigator.share({title:"Rutina "+r.nombre,url:link}).catch(()=>{});}
                            else{navigator.clipboard&&navigator.clipboard.writeText(link);toast2("Link copiado!");}
                          }}>{es?"📤 Compartir":"📤 Share"}</button>
                        <button className="hov" style={{background:"#ef444422",color:"#ef4444",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={async()=>{
                            if(!confirm("Borrar rutina "+r.nombre+"?")) return;
                            await sb.deleteRutina(r.id);
                            setRutinasSB(prev=>prev.filter(x=>x.id!==r.id));
                            toast2("Rutina eliminada");
                          }}>{es?"🗑 Borrar":"🗑 Delete"}</button>
                      </div>
                    </div>
                  ))}
                  {alumnoProgreso.length>0&&(
                    <div style={{marginTop:10,marginBottom:6}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,letterSpacing:1}}>📊 REGISTROS DE {a.nombre.toUpperCase()}</div>

                        {["Esta semana","Historial","Por ejercicio"].map((t,ti)=>(

                        ))}
                      </div>
                      {/* Esta semana */}
                      {registrosSubTab===0&&(()=>{
                        const rpeColors={"6":"#22c55e","7":"#84cc16","8":"#eab308","9":"#f97316","10":"#ef4444"};
                        const hoy=new Date().toISOString().split("T")[0];
                        const recientes=alumnoProgreso.slice(0,15);
                        if(!recientes.length) return <div style={{fontSize:13,color:"#4a5568",textAlign:"center",padding:"20px 0"}}>Sin registros esta semana</div>;
                        return recientes.map((p,pi)=>{
                          const exData=EX.find(e=>e.id===p.ejercicio_id);
                          const rpeCol=rpeColors[String(p.rpe)]||"#9ca3af";
                          return(
                            <div key={pi} style={{background:"#07080d",borderRadius:8,padding:"9px 10px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:800}}>{exData?.name||p.ejercicio_id}</div>
                                <div style={{fontSize:11,color:"#9ca3af"}}>{p.sets||"-"}x{p.reps||"-"}{p.kg?" · "+p.kg+"kg":""}</div>
                              </div>
                              {p.rpe&&<span style={{background:rpeCol+"22",color:rpeCol,border:"1px solid "+rpeCol+"44",borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:800,flexShrink:0}}>RPE {p.rpe}</span>}
                              <div style={{fontSize:11,color:"#4a5568",flexShrink:0}}>{p.fecha}</div>
                            </div>
                          );
                        });
                      })()}
                      {/* Historial por sesión */}
                      {registrosSubTab===1&&(()=>{
                        const byFecha={};
                        alumnoProgreso.forEach(p=>{
                          if(!byFecha[p.fecha]) byFecha[p.fecha]=[];
                          byFecha[p.fecha].push(p);
                        });
                        const fechas=Object.keys(byFecha).sort((a,b)=>b.localeCompare(a));
                        if(!fechas.length) return <div style={{fontSize:13,color:"#4a5568",textAlign:"center",padding:"20px 0"}}>Sin historial</div>;
                        return fechas.slice(0,10).map(fecha=>{
                          const sets=byFecha[fecha];
                          const rpeProm=sets.filter(s=>s.rpe).length?Math.round(sets.filter(s=>s.rpe).reduce((a,s)=>a+s.rpe,0)/sets.filter(s=>s.rpe).length*10)/10:null;
                          const rpeCol=rpeProm>=9?"#ef4444":rpeProm>=8?"#f97316":rpeProm>=7?"#eab308":"#22c55e";
                          return(
                            <div key={fecha} style={{background:"#07080d",borderRadius:8,padding:"10px",marginBottom:6}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <div style={{fontSize:13,fontWeight:800}}>{fecha}</div>
                                <span style={{fontSize:11,fontWeight:700,color:"#22c55e"}}>{sets.length} registros</span>
                              </div>
                              {rpeProm&&<div style={{fontSize:12,color:"#9ca3af"}}>RPE promedio: <strong style={{color:rpeCol}}>{rpeProm}</strong></div>}
                            </div>
                          );
                        });
                      })()}
                      {/* Por ejercicio */}
                      {registrosSubTab===2&&(()=>{
                        const rpeColors={"6":"#22c55e","7":"#84cc16","8":"#eab308","9":"#f97316","10":"#ef4444"};
                        const byEx={};
                        alumnoProgreso.forEach(p=>{
                          if(!byEx[p.ejercicio_id]) byEx[p.ejercicio_id]={sets:[]};
                          byEx[p.ejercicio_id].sets.push(p);
                        });
                        return Object.entries(byEx).slice(0,8).map(([exId,data])=>{
                          const exData=EX.find(e=>e.id===exId);
                          const maxKg=Math.max(...data.sets.map(s=>s.kg||0));
                          const last=data.sets[0];
                          const prev=data.sets[1];
                          const trend=prev&&last?.kg&&prev?.kg?(last.kg>prev.kg?"↑":last.kg<prev.kg?"↓":"="):null;
                          const trendCol=trend==="↑"?"#22c55e":trend==="↓"?"#ef4444":"#9ca3af";
                          const rpeCol=rpeColors[String(last?.rpe)]||"#9ca3af";
                          return(
                            <div key={exId} style={{background:"#07080d",borderRadius:8,padding:"10px",marginBottom:6}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                                <div style={{fontSize:13,fontWeight:800}}>{exData?.name||exId}</div>
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                  {last?.rpe&&<span style={{background:rpeCol+"22",color:rpeCol,border:"1px solid "+rpeCol+"44",borderRadius:6,padding:"2px 6px",fontSize:11,fontWeight:800}}>RPE {last.rpe}</span>}
                                  {trend&&<span style={{fontSize:13,fontWeight:800,color:trendCol}}>{trend}</span>}
                                </div>
                              </div>
                              <div style={{display:"flex",gap:12,fontSize:11,color:"#9ca3af"}}>
                                <span>Máx: <strong style={{color:"#ef4444"}}>{maxKg}kg</strong></span>
                                <span>Último: <strong style={{color:"#e2e8f0"}}>{last?.sets||"-"}x{last?.reps||"-"} · {last?.kg||"-"}kg</strong></span>
                                <span>{data.sets.length} sesiones</span>
                              </div>
                            </div>
                          );
                        });
                      })()}
                    </div>
                  )}

                  {/* FOTOS DEL ALUMNO */}
                  <div style={{marginTop:10,marginBottom:6}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,letterSpacing:1}}>📸 FOTOS DE {a.nombre.toUpperCase()}</div>
                    <FotosProgreso sharedParam={btoa(JSON.stringify({alumnoId:a.id}))} sb={sb} esEntrenador={true}/>
                  </div>

                  {/* CHAT CON ALUMNO */}
                  <div style={{marginTop:10,marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#4a5568",letterSpacing:1}}>💬 CHAT CON {a.nombre.toUpperCase()}</div>
                      <button className="hov" onClick={()=>setChatOpenId(chatOpenId===a.id?null:a.id)}
                        style={{background:"#1a1d2e",border:"none",borderRadius:8,padding:"4px 12px",color:"#9ca3af",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                        {chatOpenId===a.id?"▲ Cerrar":"▼ Abrir"}
                      </button>
                    </div>
                    {chatOpenId===a.id&&<Chat alumnoId={a.id} alumnoNombre={a.nombre} esEntrenador={true} sb={sb}/>}
                  </div>

                  {alumnoSesiones.length>0&&(
                    <div style={{marginTop:10,marginBottom:6}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,letterSpacing:1}}>🏋️ SESIONES COMPLETADAS</div>
                      {alumnoSesiones.slice(0,5).map((s,i)=>(
                        <div key={i} style={{background:"#07080d",borderRadius:8,padding:"8px 10px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:700,color:"#22c55e"}}>✅ {s.dia_label} - Sem {s.semana}</div>
                            <div style={{fontSize:11,color:"#4a5568"}}>{s.fecha} · {s.hora}</div>
                          </div>
                          <div style={{fontSize:11,color:"#4a5568",textAlign:"right"}}>{s.rutina_nombre}</div>
                        </div>
                      ))}
                      {alumnoSesiones[0]&&(()=>{
                        const hoy = new Date().toLocaleDateString("es-AR");
                        const entrenoHoy = alumnoSesiones[0].fecha===hoy;
                        return <div style={{fontSize:13,fontWeight:700,color:entrenoHoy?"#22c55e":"#f59e0b",marginBottom:6}}>
                          {entrenoHoy?"🟢 Entrenó hoy":"🟡 Último entreno: "+alumnoSesiones[0].fecha}

function LogForm({ex,es,btn,inp,lbl,tag,fmtP,progress,onLog,onClose}) {
  const [kg,setKg]=useState("");
  const [reps,setReps]=useState(ex.reps||"");
  const [note,setNote]=useState("");
  const [pause,setPause]=useState(ex.pause||90);
  const [rpe,setRpe]=useState(null);
  const pat=PATS[ex.pattern]||{icon:"💪",color:"#9ca3af",label:"Otro",labelEn:"Other"};
  const lastSet=progress[ex.id]?.sets?.[0];
  const rpeColors={6:"#22c55e",7:"#84cc16",8:"#eab308",9:"#f97316",10:"#ef4444"};
  const rpeLabels={6:"Muy facil",7:"Controlado",8:"Exigente",9:"Muy duro",10:"Al limite"};
  return(
    <div style={{background:"#0e1018",borderRadius:"16px 16px 0 0",padding:"20px 16px",width:"100%"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <span style={{fontSize:29}}>{pat?.icon}</span>
        <div style={{fontSize:21,fontWeight:700,flex:1}}>{es?ex.name:ex.nameEn}</div>
        <button className="hov" style={{...btn(),fontSize:22,padding:"4px 10px"}} onClick={onClose}>x</button>
      </div>
      {lastSet&&<div style={{background:"#13151f",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:15,color:"#9ca3af"}}>{es?"Ultimo":"Last"}: <strong style={{color:"#e2e8f0"}}>{lastSet.kg}kg x {lastSet.reps}</strong> · {lastSet.date}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><span style={lbl}>KG</span><input style={inp} type="number" value={kg} onChange={e=>setKg(e.target.value)} placeholder={lastSet?.kg||"kg"}/></div>
        <div><span style={lbl}>REPS</span><input style={inp} type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder={ex.reps||"reps"}/></div>
      </div>
      <div style={{marginBottom:8}}><span style={lbl}>NOTA</span><input style={inp} value={note} onChange={e=>setNote(e.target.value)} placeholder={es?"Sensaciones...":"Feelings..."}/></div>
      <div style={{marginBottom:10}}>
        <span style={lbl}>PAUSA: {fmtP(pause)}</span>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[0,60,90,120,180,240].map(p=>(
            <button key={p} className="hov" style={{...btn(pause===p?pat?.color+"44":undefined),padding:"4px 10px",fontSize:15}} onClick={()=>setPause(p)}>{fmtP(p)}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <span style={lbl}>RPE — {es?"ESFUERZO PERCIBIDO":"PERCEIVED EFFORT"}: {rpe?<span style={{color:rpeColors[rpe],fontWeight:800}}>{rpe} — {rpeLabels[rpe]}</span>:"sin registrar"}</span>
        <div style={{display:"flex",gap:5,marginTop:5}}>
          {[6,7,8,9,10].map(v=>(
            <button key={v} className="hov" style={{flex:1,padding:"8px 2px",border:"1px solid "+(rpe===v?rpeColors[v]:rpeColors[v]+"44"),borderRadius:8,background:rpe===v?rpeColors[v]+"33":"#0a0c14",color:rpe===v?rpeColors[v]:rpeColors[v]+"99",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",transform:rpe===v?"scale(1.08)":"scale(1)",transition:"all .15s"}} onClick={()=>setRpe(rpe===v?null:v)}>{v}</button>
          ))}
        </div>
      </div>
      <button className="hov" style={{...btn(pat?.color||"#4ade80"),width:"100%",padding:"11px",fontSize:18,color:"#000"}} onClick={()=>onLog(kg,reps,note,pause,rpe)}>
        + REGISTRAR SET
      </button>
    </div>
  );
}

function Chat({alumnoId, alumnoNombre, esEntrenador, sb}) {
  const [mensajes, setMensajes] = React.useState([]);
  const [texto, setTexto] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const [enviando, setEnviando] = React.useState(false);
  const endRef = React.useRef();

  React.useEffect(()=>{
    sb.getMensajes(alumnoId).then(m=>{ setMensajes(m||[]); setLoading(false); });
    // Polling cada 10 segundos
    const interval = setInterval(()=>{
      sb.getMensajes(alumnoId).then(m=>{ if(m) setMensajes(m); });
    }, 10000);
    return ()=>clearInterval(interval);
  },[]);

  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[mensajes]);

  const enviar = async () => {
    if(!texto.trim() || enviando) return;
    setEnviando(true);
    const msg = {alumno_id:alumnoId, texto:texto.trim(), de_entrenador:esEntrenador, nombre:esEntrenador?"Entrenador":alumnoNombre};
    const res = await sb.addMensaje(msg);
    if(res&&res[0]) setMensajes(prev=>[...prev,res[0]]);
    setTexto("");
    setEnviando(false);
  };

  if(loading) return <div style={{textAlign:"center",padding:20,color:"#4a5568"}}>Cargando...</div>;

  return (
    <div style={{display:"flex",flexDirection:"column",height:400}}>
      <div style={{flex:1,overflowY:"auto",padding:"8px 0",marginBottom:8}}>
        {mensajes.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#4a5568",fontSize:13}}>Sin mensajes aún. ¡Escribí el primero!</div>}
        {mensajes.map((m,i)=>{
          const esMio = esEntrenador ? m.de_entrenador : !m.de_entrenador;
          return (
            <div key={i} style={{display:"flex",justifyContent:esMio?"flex-end":"flex-start",marginBottom:10}}>
              <div style={{maxWidth:"78%",
                background:m.de_entrenador?"#1d4ed8":"#15803d",
                borderRadius:esMio?"14px 14px 2px 14px":"14px 14px 14px 2px",
                padding:"10px 14px"}}>
                <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.7)",marginBottom:3,letterSpacing:0.5}}>
                  {m.de_entrenador?"🏋️ Entrenador":"👤 "+m.nombre}
                </div>
                <div style={{fontSize:16,color:"#e2e8f0",lineHeight:1.4}}>{m.texto}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:4,textAlign:"right"}}>
                  {m.created_at ? new Date(m.created_at).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}) : ""}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <input style={{flex:1,background:"#0a0c14",color:"#e2e8f0",border:"1px solid #2d3748",borderRadius:10,padding:"11px 14px",fontFamily:"DM Sans,sans-serif",fontSize:16}} value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Escribí un mensaje..." onKeyDown={e=>e.key==="Enter"&&enviar()}/>
        <button style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:700,cursor:"pointer"}} onClick={enviar}>
          {enviando?"...":"▶"}
        </button>
      </div>
    </div>
  );
}

function ChatFlotante({alumnoId, alumnoNombre, sb, esEntrenador}) {
  const [abierto, setAbierto] = React.useState(false);
  const [unread, setUnread] = React.useState(0);
  const [lastCount, setLastCount] = React.useState(0);

  React.useEffect(()=>{
    if(!alumnoId) return;
    const check = ()=>sb.getMensajes(alumnoId).then(m=>{
      if(m && m.length > lastCount && !abierto) { setUnread(m.length-lastCount); }
      setLastCount(m?.length||0);
    });
    check();
    const interval = setInterval(check, 15000);
    return ()=>clearInterval(interval);
  },[alumnoId, abierto]);

  if(!alumnoId) return null;

  return (
    <div>
      {abierto&&(
        <div style={{position:"fixed",bottom:76,right:14,width:290,maxWidth:"calc(100vw - 28px)",background:"#0e1018",borderRadius:16,border:"1px solid #2d3748",zIndex:150,padding:16,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:800,color:"#e2e8f0"}}>💬 Chat con Entrenador</div>
            <button onClick={()=>setAbierto(false)} style={{background:"none",border:"none",color:"#4a5568",fontSize:20,cursor:"pointer"}}>✕</button>
          </div>
          <Chat alumnoId={alumnoId} alumnoNombre={alumnoNombre} esEntrenador={esEntrenador} sb={sb}/>
        </div>
      )}
      <button onClick={()=>{setAbierto(a=>!a);setUnread(0);}} style={{position:"fixed",bottom:86,right:14,background:"#ef4444",color:"#fff",border:"none",borderRadius:"50%",width:40,height:40,fontSize:16,cursor:"pointer",zIndex:149,boxShadow:"0 4px 12px rgba(239,68,68,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        💬
        {unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#22c55e",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
      </button>
    </div>
  );
}

function GraficoProgreso({progress, EX, readOnly, sharedParam, sb, sessionData}) {
  const [vista, setVista] = React.useState("ejercicio"); // ejercicio | semanas | volumen
  const [selEx, setSelEx] = React.useState(null);
  const [sbData, setSbData] = React.useState([]);
  const [sesiones, setSesiones] = React.useState([]);
  const canvasRef = React.useRef();
  const canvasSem = React.useRef();
  const canvasVol = React.useRef();

  React.useEffect(()=>{
    const alumnoId = sessionData?.alumnoId || (sharedParam?(()=>{try{return JSON.parse(atob(sharedParam)).alumnoId}catch(e){return null}})():null);
    if(!alumnoId) return;
    sb.getProgreso(alumnoId).then(d=>{ if(d) setSbData(d); });
    sb.getSesiones(alumnoId).then(d=>{ if(d) setSesiones(d); });
  },[]);

  const getDatos = (exId) => {
    const local = (progress[exId]?.sets||[]).map(s=>({kg:parseFloat(s.kg)||0,reps:parseInt(s.reps)||0,fecha:s.date})).filter(s=>s.kg>0);
    const remote = sbData.filter(d=>d.ejercicio_id===exId&&d.kg>0).map(d=>({kg:parseFloat(d.kg),reps:parseInt(d.reps)||0,fecha:d.fecha}));
    const todos = [...local,...remote].sort((a,b)=>a.fecha>b.fecha?1:-1);
    const seen = new Set();
    return todos.filter(d=>{ const k=d.fecha+d.kg; if(seen.has(k))return false; seen.add(k); return true; }).slice(-20);
  };

  const exConDatos = EX.filter(e=>{
    const local = (progress[e.id]?.sets||[]).some(s=>parseFloat(s.kg)>0);
    const remote = sbData.some(d=>d.ejercicio_id===e.id&&d.kg>0);
    return local || remote;
  });

  // PR por ejercicio
  const getPR = (exId) => {
    const datos = getDatos(exId);
    if(!datos.length) return null;
    return Math.max(...datos.map(d=>d.kg));
  };

  // Grupo muscular por ejercicio
  const MUSCULOS = {
    sq:"Piernas",leg:"Piernas",legcurl:"Piernas",legext:"Piernas",
    bp:"Pecho",inc:"Pecho",fly:"Pecho",
    row:"Espalda",pull:"Espalda",dead:"Espalda",suppu:"Espalda",
    press:"Hombros",lateralfly:"Hombros",
    curl:"Bíceps",hammer:"Bíceps",
    trico:"Tríceps",
    plank:"Core",crunch:"Core",ab:"Core"
  };
  const getMus = (id) => {
    for(const k in MUSCULOS) { if(id.includes(k)) return MUSCULOS[k]; }
    return "Otros";
  };

  // Datos de volumen semanal
  const getVolumenSemanal = () => {
    const semanas = {};
    sesiones.forEach(ses=>{
      const fecha = ses.fecha||ses.created_at?.slice(0,10)||"";
      if(!fecha) return;
      const d = new Date(fecha);
      const startOfWeek = new Date(d);
      startOfWeek.setDate(d.getDate() - d.getDay());
      const semKey = startOfWeek.toISOString().slice(0,10);
      if(!semanas[semKey]) semanas[semKey] = {series:0, tonelaje:0, label:semKey.slice(5)};
      const ejercicios = Array.isArray(ses.ejercicios) ? ses.ejercicios : [];
      ejercicios.forEach(ex=>{
        const sets = ex.sets||[];
        sets.forEach(s=>{
          const kg = parseFloat(s.kg)||0;
          const reps = parseInt(s.reps)||0;
          semanas[semKey].series += 1;
          semanas[semKey].tonelaje += kg*reps;
        });
      });
    });
    return Object.values(semanas).sort((a,b)=>a.label>b.label?1:-1).slice(-8);
  };

  // Datos por músculo semanal
  const getVolumenMuscular = () => {
    const musculos = {};
    sesiones.forEach(ses=>{
      const ejercicios = Array.isArray(ses.ejercicios) ? ses.ejercicios : [];
      ejercicios.forEach(ex=>{
        const mus = getMus(ex.id||"");
        const sets = (ex.sets||[]).filter(s=>parseFloat(s.kg)>0);
        if(!musculos[mus]) musculos[mus] = {series:0, tonelaje:0};
        musculos[mus].series += sets.length;
        sets.forEach(s=>{ musculos[mus].tonelaje += (parseFloat(s.kg)||0)*(parseInt(s.reps)||0); });
      });
    });
    return Object.entries(musculos).map(([k,v])=>({nombre:k,...v})).sort((a,b)=>b.series-a.series);
  };

  // CANVAS: curva de progreso por ejercicio
  React.useEffect(()=>{
    try {
    if(vista!=="ejercicio"||!selEx||!canvasRef.current) return;
    const datos = getDatos(selEx);
    if(datos.length<2) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W=canvas.width, H=canvas.height;
    const pad={top:30,right:20,bottom:44,left:50};
    const maxKg = Math.max(...datos.map(d=>d.kg));
    const minKg = Math.min(...datos.map(d=>d.kg));
    const range = maxKg-minKg||1;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#0a0c14"; ctx.fillRect(0,0,W,H);
    // Grid lines
    for(let i=0;i<=4;i++){
      const y=pad.top+(H-pad.top-pad.bottom)*i/4;
      ctx.strokeStyle="#1a1d2e"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
      ctx.fillStyle="#4a5568"; ctx.font="11px DM Sans,Arial"; ctx.textAlign="right";
      ctx.fillText(Math.round(maxKg-range*i/4)+"kg",pad.left-4,y+4);
    }
    const pts = datos.map((d,i)=>({
      x:pad.left+(W-pad.left-pad.right)*i/(datos.length-1),
      y:pad.top+(H-pad.top-pad.bottom)*(1-(d.kg-minKg)/range),
      kg:d.kg, fecha:d.fecha
    }));
    // Área
    ctx.beginPath(); ctx.moveTo(pts[0].x,H-pad.bottom);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H-pad.bottom); ctx.closePath();
    ctx.fillStyle="rgba(239,68,68,0.12)"; ctx.fill();
    // Línea
    ctx.beginPath(); ctx.strokeStyle="#ef4444"; ctx.lineWidth=2.5;
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    // PR line
    const prY = pad.top+(H-pad.top-pad.bottom)*(1-(maxKg-minKg)/range);
    ctx.setLineDash([4,4]); ctx.strokeStyle="#facc15"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,prY); ctx.lineTo(W-pad.right,prY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#facc15"; ctx.font="bold 10px DM Sans,Arial"; ctx.textAlign="left";
    ctx.fillText("PR "+maxKg+"kg",pad.left+4,prY-4);
    // Puntos
    pts.forEach((p,i)=>{
      const isPR = p.kg===maxKg;
      ctx.beginPath(); ctx.arc(p.x,p.y,isPR?6:4,0,Math.PI*2);
      ctx.fillStyle=isPR?"#facc15":"#ef4444"; ctx.fill();
      if(isPR){ctx.fillStyle="#facc15";ctx.font="bold 11px DM Sans,Arial";ctx.textAlign="center";ctx.fillText("★",p.x,p.y-10);}
      ctx.fillStyle="#e2e8f0"; ctx.font="10px DM Sans,Arial"; ctx.textAlign="center";
      ctx.fillText(p.kg+"kg",p.x,p.y-(isPR?22:10));
    });
    // Fechas
    ctx.fillStyle="#4a5568"; ctx.font="10px DM Sans,Arial"; ctx.textAlign="center";
    const step=Math.ceil(pts.length/4);
    pts.forEach((p,i)=>{ if(i%step===0||i===pts.length-1) ctx.fillText(p.fecha.slice(5),p.x,H-pad.bottom+14); });
    } catch(e){ console.error("canvas err",e); }
  },[selEx,sbData,vista]);

  // CANVAS: comparar semanas (barras)
  React.useEffect(()=>{
    try {
    if(vista!=="semanas"||!canvasSem.current) return;
    const datos = getVolumenSemanal();
    if(!datos.length) return;
    const canvas=canvasSem.current;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    const pad={top:20,right:10,bottom:50,left:55};
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#0a0c14"; ctx.fillRect(0,0,W,H);
    const maxSeries=Math.max(...datos.map(d=>d.series))||1;
    const maxTon=Math.max(...datos.map(d=>d.tonelaje))||1;
    const bw=(W-pad.left-pad.right)/datos.length-6;
    datos.forEach((d,i)=>{
      const x=pad.left+i*(W-pad.left-pad.right)/datos.length+3;
      // Series (azul)
      const hS=(H-pad.top-pad.bottom)*(d.series/maxSeries);
      ctx.fillStyle="#3b82f6"; ctx.fillRect(x,H-pad.bottom-hS,bw*0.45,hS);
      // Tonelaje (rojo)
      const hT=(H-pad.top-pad.bottom)*(d.tonelaje/maxTon);
      ctx.fillStyle="#ef4444"; ctx.fillRect(x+bw*0.48,H-pad.bottom-hT,bw*0.45,hT);
      // Label semana
      ctx.fillStyle="#4a5568"; ctx.font="10px DM Sans,Arial"; ctx.textAlign="center";
      ctx.fillText(d.label,x+bw/2,H-pad.bottom+14);
      // Valores
      if(d.series>0){ctx.fillStyle="#3b82f6";ctx.font="9px DM Sans,Arial";ctx.textAlign="center";ctx.fillText(d.series,x+bw*0.22,H-pad.bottom-hS-3);}
    });
    // Leyenda
    ctx.fillStyle="#3b82f6"; ctx.fillRect(pad.left,8,12,10);
    ctx.fillStyle="#ccc"; ctx.font="10px DM Sans,Arial"; ctx.textAlign="left"; ctx.fillText("Series",pad.left+15,17);
    ctx.fillStyle="#ef4444"; ctx.fillRect(pad.left+70,8,12,10);
    ctx.fillStyle="#ccc"; ctx.fillText("Tonelaje",pad.left+85,17);
    // Eje Y
    for(let i=0;i<=4;i++){
      const y=pad.top+(H-pad.top-pad.bottom)*i/4;
      ctx.strokeStyle="#1a1d2e";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
      ctx.fillStyle="#4a5568";ctx.font="10px DM Sans,Arial";ctx.textAlign="right";
      ctx.fillText(Math.round(maxSeries*(1-i/4)),pad.left-3,y+4);
    }
    } catch(e){ console.error("Canvas semanas:",e); }
  },[sesiones,vista]);

  const volMuscular = vista==="volumen" ? getVolumenMuscular() : [];
  const COLORS = ["#ef4444","#3b82f6","#22c55e","#facc15","#a855f7","#f97316","#ec4899"];

  if(exConDatos.length===0 && sesiones.length===0) return (
    <div style={{textAlign:"center",padding:"30px 0",color:"#4a5568"}}>
      <div style={{fontSize:32,marginBottom:8}}>📊</div>
      <div style={{fontSize:14,fontWeight:700}}>Sin datos aún</div>
      <div style={{fontSize:12,marginTop:4}}>Registrá series con peso para ver el gráfico</div>
    </div>
  );

  return (
    <div>
      {/* Selector de vista */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["ejercicio","💪 Progreso"],["semanas","📅 Semanas"],["volumen","🏋️ Volumen"]].map(([k,lbl])=>(
          <button key={k} onClick={()=>setVista(k)} style={{background:vista===k?"#ef4444":"#1a1d2e",color:vista===k?"#fff":"#9ca3af",border:"none",borderRadius:8,padding:"7px 12px",fontFamily:"Barlow Condensed,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",flex:1}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* VISTA: progreso por ejercicio */}
      {vista==="ejercicio"&&(
        <div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {exConDatos.map(e=>{
              const pr=getPR(e.id);
              return (
                <button key={e.id} onClick={()=>setSelEx(e.id)} style={{background:selEx===e.id?"#ef4444":"#1a1d2e",color:selEx===e.id?"#fff":"#9ca3af",border:"none",borderRadius:8,padding:"5px 10px",fontFamily:"Barlow Condensed,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <span>{e.name}</span>
                  {pr&&<span style={{fontSize:10,color:selEx===e.id?"rgba(255,255,255,0.8)":"#facc15"}}>⭐{pr}kg</span>}
                </button>
              );
            })}
          </div>
          {selEx&&getDatos(selEx).length>=2&&(
            <div>
              <canvas ref={canvasRef} width={340} height={200} style={{width:"100%",height:"auto",display:"block",borderRadius:10,marginBottom:10}}/>
              <div style={{display:"flex",gap:8,justifyContent:"space-around",background:"#0e1018",borderRadius:10,padding:"10px"}}>
                {[["⭐",getPR(selEx)+"kg","PR"],["📈",getDatos(selEx)[getDatos(selEx).length-1]?.kg+"kg","ÚLTIMO"],["📊",getDatos(selEx).length,"SESIONES"]].map(([ic,v,lbl])=>(
                  <div key={lbl} style={{textAlign:"center"}}>
                    <div style={{fontSize:19,fontWeight:800,color:"#e2e8f0"}}>{ic} {v}</div>
                    <div style={{fontSize:11,color:"#4a5568"}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {selEx&&getDatos(selEx).length<2&&<div style={{textAlign:"center",padding:20,color:"#4a5568",fontSize:13}}>Necesitás al menos 2 registros para ver el gráfico</div>}
          {!selEx&&<div style={{textAlign:"center",padding:20,color:"#4a5568",fontSize:13}}>Seleccioná un ejercicio arriba</div>}
        </div>
      )}

      {/* VISTA: comparar semanas */}
      {vista==="semanas"&&(
        <div>
          {sesiones.length>=2
            ? <canvas ref={canvasSem} width={340} height={220} style={{width:"100%",height:"auto",display:"block",borderRadius:10,marginBottom:10}}/>
            : <div style={{textAlign:"center",padding:30,color:"#4a5568",fontSize:13}}>Necesitás al menos 2 sesiones completadas</div>
          }
          {sesiones.length>=2&&(()=>{
            const sem=getVolumenSemanal();
            const ultima=sem[sem.length-1];
            const anterior=sem[sem.length-2];
            const diff=anterior&&anterior.series>0?Math.round((ultima?.series-anterior.series)/anterior.series*100):null;
            return (
              <div style={{background:"#0e1018",borderRadius:10,padding:10,display:"flex",gap:8,justifyContent:"space-around"}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:"#3b82f6"}}>{ultima?.series||0}</div><div style={{fontSize:11,color:"#4a5568"}}>SERIES HOY SEMANA</div></div>
                <div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:"#ef4444"}}>{Math.round((ultima?.tonelaje||0)/1000*10)/10}t</div><div style={{fontSize:11,color:"#4a5568"}}>TONELAJE</div></div>
                {diff!==null&&<div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:diff>=0?"#22c55e":"#ef4444"}}>{diff>=0?"+":""}{diff}%</div><div style={{fontSize:11,color:"#4a5568"}}>VS SEMANA ANT.</div></div>}
              </div>
            );
          })()}
        </div>
      )}

      {/* VISTA: volumen muscular */}
      {vista==="volumen"&&(
        <div>
          {volMuscular.length===0
            ? <div style={{textAlign:"center",padding:30,color:"#4a5568",fontSize:13}}>Sin sesiones registradas aún</div>
            : (
              <div>
                {volMuscular.map((m,i)=>{
                  const maxS=volMuscular[0].series;
                  const pct=Math.round(m.series/maxS*100);
                  return (
                    <div key={m.nombre} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{m.nombre}</span>
                        <span style={{fontSize:13,color:"#9ca3af"}}>{m.series} series · {Math.round(m.tonelaje/1000*10)/10}t</span>
                      </div>
                      <div style={{background:"#1a1d2e",borderRadius:6,height:10,overflow:"hidden"}}>
                        <div style={{background:COLORS[i%COLORS.length],height:"100%",width:pct+"%",borderRadius:6,transition:"width 0.5s"}}/>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:"#0e1018",borderRadius:10,padding:10,marginTop:8,display:"flex",gap:8,justifyContent:"space-around"}}>
                  <div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:"#e2e8f0"}}>{volMuscular.reduce((a,m)=>a+m.series,0)}</div><div style={{fontSize:11,color:"#4a5568"}}>SERIES TOTALES</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:"#ef4444"}}>{Math.round(volMuscular.reduce((a,m)=>a+m.tonelaje,0)/1000*10)/10}t</div><div style={{fontSize:11,color:"#4a5568"}}>TONELAJE TOTAL</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:19,fontWeight:800,color:"#3b82f6"}}>{sesiones.length}</div><div style={{fontSize:11,color:"#4a5568"}}>SESIONES</div></div>
                </div>
              </div>
            )
          }
        </div>
      )}
    </div>
  );
}

function HistorialSesiones({sharedParam, sb, EX}) {
  const [sesiones, setSesiones] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    const load = async () => {
      try {
        const rutData = JSON.parse(atob(sharedParam));
        const alumnoId = rutData.alumnoId;
        if(alumnoId) {
          const ses = await sb.getSesiones(alumnoId);
          setSesiones(ses||[]);
        }
      } catch(e) {}
      setLoading(false);
    };
    load();
  },[]);

  if(loading) return <div style={{textAlign:"center",padding:20,color:"#4a5568"}}>Cargando...</div>;

  if(sesiones.length===0) return (
    <div style={{textAlign:"center",padding:"30px 0",color:"#4a5568"}}>
      <div style={{fontSize:32,marginBottom:8}}>📋</div>
      <div style={{fontSize:14,fontWeight:700}}>Sin sesiones aún</div>
      <div style={{fontSize:12,marginTop:4}}>Completá tu primer entrenamiento</div>
    </div>
  );

  return (
    <div>
      {sesiones.map((s,i)=>(
        <div key={i} style={{background:"#0e1018",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #1a1d2e"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <div style={{fontSize:15,fontWeight:800,color:"#22c55e"}}>✅ {s.dia_label}</div>
            <div style={{fontSize:12,color:"#4a5568"}}>{s.fecha} · {s.hora}</div>
          </div>
          <div style={{fontSize:12,color:"#4a5568",marginBottom:4}}>Semana {s.semana} · {s.rutina_nombre}</div>
          {s.ejercicios&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
              {s.ejercicios.split(",").map(exId=>{
                const ex = EX.find(e=>e.id===exId);
                return ex ? <span key={exId} style={{background:"#1a1d2e",color:"#9ca3af",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{ex.name}</span> : null;
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function FotosProgreso({sharedParam, sb, esEntrenador}) {
  const [fotos, setFotos] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [uploading, setUploading] = React.useState(false);
  const [fotoGrande, setFotoGrande] = React.useState(null);
  const [confirmarId, setConfirmarId] = React.useState(null);
  const fileRef = React.useRef();

  const alumnoId = React.useMemo(()=>{
    try { return JSON.parse(atob(sharedParam)).alumnoId; } catch(e) { return null; }
  },[sharedParam]);

  React.useEffect(()=>{
    if(!alumnoId) { setLoading(false); return; }
    sb.getFotos(alumnoId).then(f=>{ setFotos(f||[]); setLoading(false); });
  },[]);

  const subirFoto = async (e) => {
    const file = e.target.files[0];
    if(!file || !alumnoId) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const base64 = ev.target.result;
      const fecha = new Date().toLocaleDateString("es-AR");
      const res = await sb.addFoto({alumno_id: alumnoId, imagen: base64, fecha, nota:""});
      if(res && res[0]) setFotos(prev=>[res[0],...prev]);
      setUploading(false);
    };
    reader.readAsDataURL(file);
  };

  const borrarFoto = async (id) => {
    await sb.deleteFoto(id);
    setFotos(prev=>prev.filter(f=>f.id!==id));
    setConfirmarId(null);
  };

  if(loading) return <div style={{textAlign:"center",padding:20,color:"#4a5568"}}>Cargando...</div>;

  return (
    <div>
      {/* Solo alumno puede subir */}
      {!esEntrenador&&(
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={subirFoto} capture="environment"/>
      )}
      {!esEntrenador&&(
        <button style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:10,padding:"12px",width:"100%",fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:12}} onClick={()=>fileRef.current.click()}>
          {uploading ? "Subiendo..." : "📸 SUBIR FOTO DE PROGRESO"}
        </button>
      )}

      {/* Comparativa entrenador */}
      {esEntrenador&&fotos.length>=2&&(
        <div style={{background:"#0a0c14",borderRadius:12,padding:"12px",marginBottom:12,border:"1px solid #1a1d2e"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:10,letterSpacing:.5}}>COMPARATIVA</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{flex:1,textAlign:"center"}}>
              <img src={fotos[fotos.length-1].imagen} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:8,display:"block"}}/>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Inicio · {fotos[fotos.length-1].fecha}</div>
            </div>
            <div style={{color:"#4a5568",fontSize:20}}>→</div>
            <div style={{flex:1,textAlign:"center"}}>
              <img src={fotos[0].imagen} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:8,display:"block"}}/>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Actual · {fotos[0].fecha}</div>
            </div>
          </div>
          <div style={{marginTop:8,padding:"7px 10px",background:"#07080d",borderRadius:8,display:"flex",justifyContent:"space-around",fontSize:12}}>
            <span style={{color:"#9ca3af"}}>Total: <strong style={{color:"#ef4444"}}>{fotos.length} fotos</strong></span>
          </div>
        </div>
      )}

      {fotos.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#4a5568",fontSize:13}}>Sin fotos aún</div>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {fotos.map((f,i)=>(
          <div key={f.id||i} style={{borderRadius:10,overflow:"hidden",position:"relative"}}>
            <img src={f.imagen} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block",cursor:"pointer"}} onClick={()=>setFotoGrande(f)}/>
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(to top,rgba(0,0,0,.8),transparent)",padding:"20px 8px 6px"}}>
              <div style={{fontSize:11,color:"#e2e8f0",fontWeight:700}}>{f.fecha}</div>
            </div>
            {/* Botones acción */}
            <div style={{position:"absolute",top:6,right:6,display:"flex",gap:5}}>
              <button style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(0,0,0,.65)",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setFotoGrande(f)}>🔍</button>
              {/* Solo alumno puede borrar */}
              {!esEntrenador&&(
                <button style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,.85)",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setConfirmarId(f.id||i)}>🗑️</button>
              )}
            </div>
          </div>
        ))}
        {/* Subir nueva - solo alumno */}
        {!esEntrenador&&(
          <div style={{borderRadius:10,border:"2px dashed #2d3748",aspectRatio:"3/4",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",background:"#0a0c14"}} onClick={()=>fileRef.current.click()}>
            <div style={{fontSize:28,color:"#4a5568"}}>+</div>
            <div style={{fontSize:11,color:"#4a5568",fontWeight:700}}>Nueva foto</div>
          </div>
        )}
      </div>

      {/* Modal ver foto grande */}
      {fotoGrande&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.95)",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setFotoGrande(null)}>
          <img src={fotoGrande.imagen} style={{maxWidth:"100%",maxHeight:"80vh",objectFit:"contain",borderRadius:12}}/>
          <div style={{color:"#9ca3af",marginTop:12,fontSize:14}}>{fotoGrande.fecha}</div>
          <button style={{marginTop:12,background:"#1a1d2e",color:"#e2e8f0",border:"1px solid #2d3748",borderRadius:8,padding:"8px 20px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setFotoGrande(null)}>Cerrar</button>
        </div>
      )}

      {/* Modal confirmar borrar */}
      {confirmarId!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:310,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setConfirmarId(null)}>
          <div style={{background:"#0e1018",borderRadius:16,padding:20,width:"100%",maxWidth:320,border:"1px solid #2d3748",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,marginBottom:8}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:800,marginBottom:6}}>Borrar esta foto?</div>
            <div style={{fontSize:13,color:"#9ca3af",marginBottom:18}}>Esta accion no se puede deshacer</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,padding:"10px",background:"#1a1d2e",color:"#9ca3af",border:"1px solid #2d3748",borderRadius:10,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}} onClick={()=>setConfirmarId(null)}>Cancelar</button>
              <button style={{flex:1,padding:"10px",background:"#ef4444",color:"#fff",border:"none",borderRadius:10,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}} onClick={()=>borrarFoto(confirmarId)}>Borrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function GestionBiblioteca({sb, customEx, setCustomEx, toast2, es}) {
  const allEx = React.useMemo(()=>[...EX, ...(customEx||[])],[customEx]);
  const [tab, setTab] = React.useState(0);
  const [busq, setBusq] = React.useState("");
  const [filtPat, setFiltPat] = React.useState("todos");
  const [filtMus, setFiltMus] = React.useState("todos");
  const [modoFiltro, setModoFiltro] = React.useState("patron");
  const [editModal, setEditModal] = React.useState(null);
  const [editNombre, setEditNombre] = React.useState("");
  const [editYT, setEditYT] = React.useState("");
  const [newNombre, setNewNombre] = React.useState("");
  const [newPat, setNewPat] = React.useState("empuje");
  const [newMus, setNewMus] = React.useState("");
  const [newEquip, setNewEquip] = React.useState("");
  const [newYT, setNewYT] = React.useState("");
  const [borrarId, setBorrarId] = React.useState(null);

  const patrones = ["todos","empuje","traccion","rodilla","bisagra","core","movilidad","cardio","oly"];
  const patLabel = p => ({
    todos:"todos", empuje:es?"EMPUJE":"PUSH", traccion:es?"TRACCION":"PULL",
    rodilla:es?"RODILLA":"KNEE", bisagra:es?"BISAGRA":"HINGE", core:"CORE",
    movilidad:es?"MOVILIDAD":"MOBILITY", cardio:"CARDIO", oly:es?"OLIMPICO":"OLYMPIC",
  })[p] || p.toUpperCase();
  const musculos = ["todos","Cuadriceps","Gluteo","Isquios","Pecho","Dorsal","Hombro","Biceps","Triceps","Core","Cardio"];
  const patColors = {empuje:"#60a5fa",traccion:"#a78bfa",rodilla:"#4ade80",bisagra:"#f87171",core:"#facc15",movilidad:"#fb923c",cardio:"#34d399",pierna:"#4ade80",movil:"#fb923c"};

  const exFiltrados = allEx.filter(e=>{
    const nombre = es?(e.name):(e.nameEn||e.name); const matchQ = !busq || nombre.toLowerCase().includes(busq.toLowerCase());
    const matchPat = filtPat==="todos" || e.pattern===filtPat;
    const matchMus = filtMus==="todos" || (e.muscle||"").toLowerCase().includes(filtMus.toLowerCase());
    return matchQ && (modoFiltro==="patron"?matchPat:matchMus);
  });

  // Detectar duplicados
  const counts = {};
  allEx.forEach(e=>{ counts[e.name.toLowerCase()]=(counts[e.name.toLowerCase()]||0)+1; });
  const dupCount = Object.values(counts).filter(v=>v>1).length;

  const guardarEdicion = async () => {
    if(!editNombre.trim()){toast2(es?"Ingresa un nombre":"Enter a name");return;}
    const updated = customEx.map(e=>e.id===editModal.id?{...e,name:editNombre,youtube:editYT}:e);
    setCustomEx(updated);
    localStorage.setItem("it_customEx", JSON.stringify(updated));
    setEditModal(null); toast2(es?"Ejercicio actualizado ✓":"Exercise updated ✓");
  };

  const borrarEjercicio = (id) => {
    const updated = customEx.filter(e=>e.id!==id);
    setCustomEx(updated);
    localStorage.setItem("it_customEx", JSON.stringify(updated));
    setBorrarId(null); toast2(es?"Ejercicio eliminado ✓":"Exercise deleted ✓");
  };

  const agregarEjercicio = () => {
    if(!newNombre.trim()){toast2("Ingresa un nombre");return;}
    const newEx = {id:"custom_"+Date.now(), name:newNombre, nameEn:newNombre, pattern:newPat, muscle:newMus, equip:newEquip, youtube:newYT, custom:true};
    const updated = [...(customEx||[]), newEx];
    setCustomEx(updated);
    localStorage.setItem("it_customEx", JSON.stringify(updated));
    setNewNombre(""); setNewPat("empuje"); setNewMus(""); setNewEquip(""); setNewYT("");
    setTab(0); toast2(es?"Ejercicio agregado ✓":"Exercise added ✓");
  };

  const inpS = {background:"#07080d",border:"1px solid #2d3748",borderRadius:8,padding:"10px 12px",color:"#e2e8f0",fontSize:15,width:"100%",fontFamily:"inherit",outline:"none"};

  return (
    <div>
      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #1a1d2e",marginBottom:14}}>
        {[es?"GESTIONAR":"MANAGE",es?"+ NUEVO":"+ NEW"].map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"14px",border:"none",background:"none",fontSize:18,fontWeight:800,color:tab===i?"#ef4444":"#4a5568",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",borderBottom:tab===i?"2px solid #ef4444":"2px solid transparent"}}>
            {t}{i===0&&dupCount>0?<span style={{marginLeft:6,background:"#ef4444",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:11}}>{dupCount}</span>:null}
          </button>
        ))}
      </div>

      {tab===0&&(
        <div>
          {/* Buscador */}
          <input style={{...inpS,marginBottom:10}} placeholder={es?"🔍 Buscar ejercicio...":"🔍 Search exercise..."} value={busq} onChange={e=>setBusq(e.target.value)}/>

          {/* Seg patron/musculo */}
          <div style={{display:"flex",background:"#0a0c14",border:"1px solid #1a1d2e",borderRadius:10,padding:3,marginBottom:10}}>
            {[es?"POR PATRON":"BY PATTERN",es?"POR MUSCULO":"BY MUSCLE"].map((t,i)=>(
              <button key={i} onClick={()=>{setModoFiltro(i===0?"patron":"musculo");setFiltPat("todos");setFiltMus("todos");}} style={{flex:1,padding:"7px",border:"none",borderRadius:8,background:modoFiltro===(i===0?"patron":"musculo")?"#ef4444":"none",color:modoFiltro===(i===0?"patron":"musculo")?"#fff":"#4a5568",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                {t}
              </button>
            ))}
          </div>

          {/* Chips patron */}
          {modoFiltro==="patron"&&(
            <div style={{overflowX:"auto",paddingBottom:6,marginBottom:10}}>
              <div style={{display:"flex",gap:6,width:"max-content"}}>
                {patrones.map(p=>(
                  <button key={p} onClick={()=>setFiltPat(p)} style={{padding:"8px 16px",borderRadius:20,fontSize:15,fontWeight:800,cursor:"pointer",border:"1px solid",fontFamily:"inherit",background:filtPat===p?"#ef444422":"#0e1018",borderColor:filtPat===p?"#ef4444":"#2d3748",color:filtPat===p?"#ef4444":"#4a5568",whiteSpace:"nowrap"}}>
                    {p==="todos"?(es?"TODOS":"ALL"):p==="empuje"?(es?"EMPUJE":"PUSH"):p==="traccion"?(es?"TRACCION":"PULL"):p==="rodilla"?(es?"RODILLA":"KNEE"):p==="bisagra"?(es?"BISAGRA":"HINGE"):p==="core"?"CORE":p==="movilidad"?(es?"MOVILIDAD":"MOBILITY"):p==="cardio"?"CARDIO":p==="oly"?"OLYMPIC":p.toUpperCase()}
                  </button>

              </div>
            </div>

          {/* Chips musculo */}

                    {m==="todos"?(es?"TODOS":"ALL"):m==="Dorsal"?(es?"DORSAL":"BACK/LATS"):m==="Gluteo"?(es?"GLUTEO":"GLUTE"):m==="Isquios"?(es?"ISQUIOS":"HAMSTRINGS"):m==="Pecho"?(es?"PECHO":"CHEST"):m==="Hombro"?(es?"HOMBRO":"SHOULDER"):m==="Biceps"?(es?"BICEPS":"BICEPS"):m==="Triceps"?(es?"TRICEPS":"TRICEPS"):m==="Cuadriceps"?(es?"CUADRICEPS":"QUADS"):m==="Core"?"CORE":m==="Pantorrilla"?(es?"PANTORRILLA":"CALVES"):m.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div style={{fontSize:15,color:"#4a5568",marginBottom:10,fontWeight:700}}>{es?"Mostrando":"Showing"} {exFiltrados.length} {es?"ejercicios":"exercises"}</div>

          {exFiltrados.map(e=>{
            const isDup = counts[e.name.toLowerCase()]>1;

            return (
              <div key={e.id} style={{background:"#0e1018",border:"1px solid "+(isDup?"#ef444444":"#1a1d2e"),borderRadius:12,padding:12,marginBottom:8}}>

                      {isDup&&<span style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444433",borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:700}}>DUP</span>}

                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>{setEditModal(e);setEditNombre(e.name);setEditYT(e.youtube||"");}} style={{background:"#1a1d2e",color:"#9ca3af",border:"1px solid #2d3748",borderRadius:8,padding:"6px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✏️</button>
                      <button onClick={()=>setBorrarId(e.id)} style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444433",borderRadius:8,padding:"6px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>🗑️</button>

                </div>
              </div>
            );

        </div>

      {tab===1&&(
        <div>
          <div style={{fontSize:16,color:"#9ca3af",marginBottom:16}}>{es?"El ejercicio quedara disponible en la biblioteca para armar rutinas.":"The exercise will be available in the library to build routines."}</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:800,color:"#9ca3af",letterSpacing:1,marginBottom:6}}>{es?"NOMBRE *":"NAME *"}</div>
            <input style={inpS} value={newNombre} onChange={e=>setNewNombre(e.target.value)} placeholder="Ej: Hip Thrust con Barra"/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"#4a5568",letterSpacing:1,marginBottom:6}}>{es?"PATRON":"PATTERN"}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["empuje","traccion","rodilla","bisagra","core","movilidad","cardio"].map(p=>(
                <button key={p} onClick={()=>setNewPat(p)} style={{padding:"9px 14px",borderRadius:8,fontSize:15,fontWeight:700,border:"1px solid",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",background:newPat===p?"#ef444422":"#1a1d2e",borderColor:newPat===p?"#ef4444":"#2d3748",color:newPat===p?"#ef4444":"#9ca3af"}}>

            <input style={inpS} value={newMus} onChange={e=>setNewMus(e.target.value)} placeholder="Ej: Pecho, Triceps, Hombro"/>

            {es?"+ AGREGAR EJERCICIO":"+ ADD EXERCISE"}
          </button>
        </div>
      )}

      {/* Modal editar */}
      {editModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setEditModal(null)}>
          <div style={{background:"#0e1018",borderRadius:16,padding:20,width:"100%",maxWidth:420,border:"1px solid #2d3748"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:800,marginBottom:16}}>Editar ejercicio</div>
            <div style={{marginBottom:12}}>

      )}

      {/* Modal confirmar borrar */}
      {borrarId&&(

            <div style={{fontSize:30,marginBottom:8}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:6}}>Borrar ejercicio?</div>
            <div style={{fontSize:13,color:"#9ca3af",marginBottom:18}}>Esta accion no se puede deshacer</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setBorrarId(null)} style={{flex:1,padding:10,background:"#1a1d2e",color:"#9ca3af",border:"1px solid #2d3748",borderRadius:10,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>Cancelar</button>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}



function ScannerRutina({sb, routines, setRoutines, alumnos, toast2, setTab}) {
  const [paso, setPaso] = React.useState(1);
  const [procesando, setProcesando] = React.useState(false);
  const [progreso, setProgreso] = React.useState(0);
  const [statusMsg, setStatusMsg] = React.useState("");
  const [resultado, setResultado] = React.useState(null);
  const [nombreRutina, setNombreRutina] = React.useState("");
  const [alumnoSel, setAlumnoSel] = React.useState(null);
  const [filtroRut, setFiltroRut] = React.useState("todas");
  const fileRef = React.useRef();
  const fileGalRef = React.useRef();
  const allEx = React.useMemo(()=>{
    try{ const c=JSON.parse(localStorage.getItem("it_customEx")||"[]"); return [...EX,...c]; }catch(e){return EX;}
  },[]);

  const procesarImagen = async (base64) => {
    setPaso(2); setProcesando(true); setProgreso(0);
    const msgs = ["Detectando texto...","Reconociendo ejercicios...","Searching library...","Analizando series y reps...","Finalizando..."];
    let i=0;
    const timer = setInterval(()=>{ if(i<msgs.length){setProgreso((i+1)*18);setStatusMsg(msgs[i]);i++;}else{clearInterval(timer);} },600);

    try {
      const resp = await fetch("/api/scan",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64.split(",")[1]||base64}},
            {type:"text",text:`Sos un asistente de gimnasio. Analiza esta imagen de una rutina de entrenamiento escrita a mano o impresa.
Extrae todos los ejercicios con sus series y repeticiones.
Responde SOLO con JSON valido, sin texto extra, sin backticks:
{"nombreRutina":"nombre detectado o Rutina Escaneada","ejercicios":[{"nombre":"nombre exacto del ejercicio","series":4,"reps":"8","notas":"notas si hay"}]}
Si no ves un valor claro de series o reps, usa null. Maximo 20 ejercicios.`}
          ]}]}
        )
      });
      clearInterval(timer);
      const data = await resp.json();
      const txt = data.content?.find(c=>c.type==="text")?.text||"{}";
      let parsed;
      try{ parsed=JSON.parse(txt); }catch(e){ parsed={nombreRutina:"Rutina Escaneada",ejercicios:[]}; }
      setProgreso(100); setStatusMsg("Analysis complete");

      // Cruzar con biblioteca
      const exConMatch = (parsed.ejercicios||[]).map(ej=>{
        const nombre = ej.nombre||"";
        const match = allEx.find(e=>
          e.name.toLowerCase().includes(nombre.toLowerCase().slice(0,5)) ||
          nombre.toLowerCase().includes(e.name.toLowerCase().slice(0,5))
        );
        return {...ej, match, busqueda:"", selManual:null};
      });
      setResultado({nombre:parsed.nombreRutina||"Rutina Escaneada", ejercicios:exConMatch});
      setNombreRutina(parsed.nombreRutina||"Rutina Escaneada");
      setTimeout(()=>{ setProcesando(false); setPaso(3); },600);
    } catch(err) {
      clearInterval(timer);
      toast2("Error al procesar la imagen"); setProcesando(false); setPaso(1);
    }
  };

  const handleFile = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => procesarImagen(ev.target.result);
    reader.readAsDataURL(file);
  };

  const buscarEnBib = (idx, q) => {
    if(!resultado) return;
    const upd = resultado.ejercicios.map((e,i)=>i===idx?{...e,busqueda:q,selManual:null}:e);
    setResultado({...resultado, ejercicios:upd});
  };

  const seleccionarMatch = (idx, ex) => {
    const upd = resultado.ejercicios.map((e,i)=>i===idx?{...e,selManual:ex,busqueda:""}:e);
    setResultado({...resultado, ejercicios:upd});
  };

  const agregarAutoEx = (idx) => {
    const ej = resultado.ejercicios[idx];
    const newEx = {id:"scan_"+Date.now()+"_"+idx, name:ej.nombre, nameEn:ej.nombre, pattern:"core", muscle:"", equip:"", custom:true, scanned:true};
    const customEx = JSON.parse(localStorage.getItem("it_customEx")||"[]");
    localStorage.setItem("it_customEx", JSON.stringify([...customEx, newEx]));
    const upd = resultado.ejercicios.map((e,i)=>i===idx?{...e,selManual:newEx,autoAdded:true}:e);
    setResultado({...resultado, ejercicios:upd});

  };

  const guardarRutina = async () => {

    const dias = [{
      id:"d1", name:"Dia 1", label:"DIA 1",

        const exRef = ej.selManual||ej.match;
        return {
          exId: exRef?.id||"custom_scan_"+i,
          exName: exRef?.name||ej.nombre,

          note: ej.notas||""

    const rutina = {id:"scan_"+Date.now(), name:nombreRutina, days:dias, scanned:true, created:new Date().toLocaleDateString("es-AR")};
    setRoutines(prev=>[...prev, rutina]);
    if(alumnoSel) {
      await sb.saveRutina(alumnoSel, {nombre:nombreRutina, datos:rutina});
      toast2("Rutina creada y asignada a "+alumnos.find(a=>a.id===alumnoSel)?.nombre+" ✓");

    setPaso(4);

  const inpS = {background:"#07080d",border:"1px solid #2d3748",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:14,width:"100%",fontFamily:"inherit",outline:"none"};

          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>

          <div style={{display:"flex",gap:10,marginBottom:14}}>

              <div style={{fontSize:32,marginBottom:6}}>📸</div>
              <div>TAKE PHOTO</div>

              <div style={{fontSize:32,marginBottom:6}}>🖼️</div>
              <div>UPLOAD FILE</div>
              <div style={{fontSize:11,color:"#4a5568",marginTop:3}}>From gallery</div>

          <div style={{background:"#0a0c14",border:"1px solid #1a1d2e",borderRadius:12,padding:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#4a5568",marginBottom:8,letterSpacing:.5}}>TIPS</div>
            <div style={{fontSize:12,color:"#9ca3af",display:"flex",flexDirection:"column",gap:5}}>
              <div>✅ Good lighting, no shadows</div>

              <div>✅ Formats: "4x8", "3 sets of 10", "4 sets x 6 reps"</div>
            </div>
          </div>
        </div>
      )}

      {/* PASO 2: PROCESANDO */}
      {paso===2&&(
        <div style={{textAlign:"center",padding:"30px 0"}}>
          <div style={{fontSize:48,marginBottom:14}}>{progreso===100?"✅":"🔍"}</div>
          <div style={{fontSize:17,fontWeight:800,marginBottom:6}}>{progreso===100?"Analisis completo":"Procesando rutina..."}</div>
          <div style={{fontSize:13,color:"#9ca3af",marginBottom:20}}>{statusMsg}</div>
          <div style={{height:5,background:"#1a1d2e",borderRadius:3,overflow:"hidden",marginBottom:8}}>
            <div style={{height:"100%",background:"#ef4444",borderRadius:3,width:progreso+"%",transition:"width .5s"}}/>

      {/* PASO 3: REVISAR */}

          <div style={{background:"#22c55e15",border:"1px solid #22c55e33",borderRadius:10,padding:"10px 12px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>

      {paso===4&&(
        <div style={{textAlign:"center",paddingTop:30}}>
          <div style={{fontSize:56,marginBottom:10}}>🎉</div>

          <div style={{fontSize:14,color:"#9ca3af",marginBottom:24}}>{nombreRutina}</div>
          <div style={{background:"#22c55e15",border:"1px solid #22c55e33",borderRadius:12,padding:14,marginBottom:20,display:"flex",justifyContent:"space-around"}}>

            Escanear otra rutina
          </button>
        </div>
      )}
    </div>
  );
}

        <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:12,padding:"10px 18px",textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:900,color:"#ef4444"}}>{totalAlumnos}</div>

      <div style={{...sec}}>{es?"ESTA SEMANA":"THIS WEEK"}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        {[
          {v:statsWeek.entrenamientos, lbl:es?"ENTRENAMIENTOS":"WORKOUTS", col:"#22c55e"},
          {v:statsWeek.prs,            lbl:es?"PRs NUEVOS":"NEW PRs",           col:"#f59e0b"},
          {v:statsWeek.adherencia+"%", lbl:es?"ADHERENCIA":"ADHERENCE",    col:"#60a5fa"},
        ].map((s,i)=>(
          <div key={i} style={{background:"#0e1018",border:"1px solid "+s.col+"33",borderRadius:14,padding:"16px 8px",textAlign:"center"}}>

              <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>{a.nombre}</div>

              </div>

      {/* PRs */}
      <div style={{...sec,color:"#f59e0b"}}>🏆 {es?"PRs ESTA SEMANA":"PRs THIS WEEK"}</div>
      <div style={{background:"#0e1018",border:"1px solid #f59e0b33",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
        {prs.map((pr,i)=>(
          <div key={i} className="hov" style={{...row,cursor:"pointer",borderBottom:i<prs.length-1?"1px solid #1a1d2e":"none"}}

              <div style={{fontSize:22,fontWeight:800}}>{pr.alumno} — {pr.ejercicio}</div>
              <div style={{fontSize:16,color:"#4a5568",marginTop:3}}>{pr.nuevo} · {es?"antes":"prev"} {pr.anterior}</div>
            </div>
            <div style={{fontSize:20,fontWeight:900,color:"#22c55e",flexShrink:0}}>{pr.mejora}</div>
          </div>
        ))}
      </div>

      {/* Modal PR */}
      {modalPR&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setModalPR(null)}>
          <div style={{background:"#0e1018",borderRadius:"16px 16px 0 0",padding:"20px 16px 36px",width:"100%",maxWidth:480,border:"1px solid #1a1d2e"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <span style={{fontSize:32}}>🏆</span>
              <div>
                <div style={{fontSize:22,fontWeight:900}}>{modalPR.ejercicio}</div>
                <div style={{fontSize:14,color:"#4a5568"}}>{modalPR.alumno} · {modalPR.fecha}</div>
