            </div>
            <div style={{background:"#f59e0b11",border:"1px solid #f59e0b33",borderRadius:12,padding:"14px",marginBottom:16,display:"flex",justifyContent:"space-around",textAlign:"center"}}>
              {[[es?"NUEVO":"NEW",modalPR.nuevo,"#f59e0b"],[es?"ANTERIOR":"PREV",modalPR.anterior,"#9ca3af"],[es?"MEJORA":"GAIN",modalPR.mejora,"#22c55e"]].map(([l,v,c])=>(
                <div key={l}>
                  <div style={{fontSize:11,color:"#4a5568",fontWeight:700,letterSpacing:1}}>{l}</div>
                  <div style={{fontSize:24,fontWeight:900,color:c}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,fontWeight:700,color:"#4a5568",letterSpacing:1,marginBottom:10}}>{es?"PROGRESION":"PROGRESSION"}</div>
            {modalPR.hist.map((h,i)=>{
              const max=Math.max(...modalPR.hist.map(x=>x.v));
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <div style={{fontSize:12,color:"#4a5568",width:44,flexShrink:0}}>{h.d}</div>
                  <div style={{flex:1,height:8,background:"#13151f",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,width:Math.round((h.v/max)*100)+"%",background:h.pr?"#f59e0b":"#2d3748"}}/>
                  </div>
                  <div style={{fontSize:14,fontWeight:800,color:h.pr?"#f59e0b":"#9ca3af",width:60,textAlign:"right",flexShrink:0}}>
                    {h.v}kg {h.pr?"🏆":""}
                  </div>
                </div>
              );
            })}
            <button className="hov" onClick={()=>setModalPR(null)}
              style={{width:"100%",marginTop:14,padding:12,background:"#1a1d2e",color:"#9ca3af",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {es?"Cerrar":"Close"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


function LibraryAlumno({allEx, es}) {
  const [grupoActivo, setGrupoActivo] = React.useState("todos");
  const [q, setQ] = React.useState("");

  const GRUPOS = [
    {key:"todos",     label:"TODO",       labelEn:"ALL",        icon:"⚡",  color:"#ef4444"},
    {key:"cuad",      label:"CUADRICEPS", labelEn:"QUADS",      icon:"🦵",  color:"#4ade80"},
    {key:"isquios",   label:"ISQUIOS",    labelEn:"HAMSTRINGS", icon:"🦵",  color:"#f87171"},
    {key:"gluteos",   label:"GLUTEOS",    labelEn:"GLUTES",     icon:"🍑",  color:"#fb923c"},
    {key:"pecho",     label:"PECHO",      labelEn:"CHEST",      icon:"💪",  color:"#60a5fa"},
    {key:"espalda",   label:"ESPALDA",    labelEn:"BACK",       icon:"🔙",  color:"#a78bfa"},
    {key:"brazos",    label:"BRAZOS",     labelEn:"ARMS",       icon:"💪🏽", color:"#818cf8"},
    {key:"core",      label:"CORE",       labelEn:"CORE",       icon:"🎯",  color:"#facc15"},
    {key:"movilidad", label:"MOVILIDAD",  labelEn:"MOBILITY",   icon:"🌀",  color:"#e879f9"},
    {key:"cardio",    label:"CARDIO",     labelEn:"CARDIO",     icon:"🏃",  color:"#22d3ee"},
    {key:"oly",       label:"OLIMPICOS",  labelEn:"OLYMPIC",    icon:"🏋️",  color:"#fbbf24"},
  ];

  const matchGrupo = (e, key) => {
    if (key === "todos")    return true;
    if (key === "cuad")     return e.pattern === "rodilla";
    if (key === "isquios")  return e.pattern === "bisagra" && !/glut/i.test(e.muscle||"");
    if (key === "gluteos")  return e.pattern === "bisagra" && /glut/i.test(e.muscle||"");
    if (key === "pecho")    return e.pattern === "empuje"  && /pecho/i.test(e.muscle||"");
    if (key === "espalda")  return e.pattern === "traccion" && !/bicep|tricep/i.test(e.muscle||"");
    if (key === "brazos")   return (e.pattern === "empuje" || e.pattern === "traccion") && /bicep|tricep/i.test(e.muscle||"");
    if (key === "core")     return e.pattern === "core";
    if (key === "movilidad")return e.pattern === "movilidad";
    if (key === "cardio")   return e.pattern === "cardio";
    if (key === "oly")      return e.pattern === "oly";
    return false;
  };

  const filtered = allEx.filter(e => {
    const nombre = es ? e.name : (e.nameEn || e.name);
    const matchQ = !q || nombre.toLowerCase().includes(q.toLowerCase());
    return matchQ && matchGrupo(e, grupoActivo);
  });

  const g = GRUPOS.find(x => x.key === grupoActivo);
  const card = {background:"#0e1018",border:"1px solid #1a1d2e",borderRadius:12,padding:"12px 14px",marginBottom:8};
  const tagStyle = col => ({background:col+"22",color:col,padding:"2px 7px",borderRadius:5,fontSize:11,fontWeight:700});
  const PAT_COLORS = {rodilla:"#4ade80",bisagra:"#f87171",empuje:"#60a5fa",traccion:"#a78bfa",core:"#facc15",movilidad:"#e879f9",cardio:"#22d3ee",oly:"#fbbf24"};

  return (
    <div>
      <input
        placeholder={es?"Buscar ejercicio...":"Search exercise..."}
        value={q} onChange={e=>setQ(e.target.value)}
        style={{background:"#0a0c14",border:"1px solid #2d3748",borderRadius:10,padding:"11px 14px",
          color:"#e2e8f0",fontSize:15,width:"100%",marginBottom:12,fontFamily:"inherit",outline:"none"}}
      />
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:8,marginBottom:14,scrollbarWidth:"none"}}>
        {GRUPOS.map(gr=>(
          <button key={gr.key} onClick={()=>{setGrupoActivo(gr.key);setQ("");}}
            style={{padding:"7px 13px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",
              border: grupoActivo===gr.key ? "1px solid "+gr.color : "1px solid #2d3748",
              background: grupoActivo===gr.key ? gr.color+"22" : "#0e1018",
              color: grupoActivo===gr.key ? gr.color : "#4a5568",
              whiteSpace:"nowrap",fontFamily:"inherit"}}>
            {gr.icon} {es?gr.label:gr.labelEn}
          </button>
        ))}
      </div>
      {grupoActivo !== "todos" && !q && g && (
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 12px",
          background:g.color+"15",border:"1px solid "+g.color+"33",borderRadius:12}}>
          <span style={{fontSize:22}}>{g.icon}</span>
          <div style={{fontSize:18,fontWeight:900,color:g.color}}>{es?g.label:g.labelEn}</div>
          <div style={{marginLeft:"auto",fontSize:13,color:g.color,fontWeight:700}}>{filtered.length} {es?"ejercicios":"exercises"}</div>
        </div>
      )}
      <div style={{fontSize:12,color:"#4a5568",marginBottom:10}}>{filtered.length} {es?"ejercicios":"exercises"}</div>
      {filtered.map(e => {
        const nombre = es ? e.name : (e.nameEn || e.name);
        const patCol = PAT_COLORS[e.pattern] || "#9ca3af";
        return (
          <div key={e.id} style={card}>
            <div style={{fontSize:16,fontWeight:800}}>{nombre}</div>
            <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
              <span style={tagStyle(patCol)}>{e.pattern?.toUpperCase()}</span>
              <span style={{background:"#1a1d2e",color:"#9ca3af",padding:"2px 7px",borderRadius:5,fontSize:11,fontWeight:700}}>{e.equip}</span>
              {e.youtube && (
                <a href={e.youtube} target="_blank" rel="noopener noreferrer"
                  style={{display:"inline-flex",alignItems:"center",gap:3,background:"#ef444422",color:"#ef4444",
                    border:"1px solid #ef444433",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,textDecoration:"none"}}>
                  ▶ VIDEO
                </a>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function LoginForm({es,btn,inp,lbl,onLogin,onClose}) {
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  return(
    <div>
      <div style={{fontSize:24,fontWeight:800,letterSpacing:2,marginBottom:14,textAlign:"center"}}>{mode==="login"?(es?"INICIAR SESION":"LOG IN"):(es?"REGISTRO":"REGISTER")}</div>
      {mode==="register"&&<div style={{marginBottom:8}}><span style={lbl}>{es?es?"NOMBRE":"NAME":"NAME"}</span><input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre"/></div>}
      <div style={{marginBottom:8}}><span style={lbl}>EMAIL</span><input style={inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@ejemplo.com"/></div>
      <div style={{marginBottom:14}}><span style={lbl}>{es?"CONTRASENA":"PASSWORD"}</span><input style={inp} type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="*****"/></div>
      <button className="hov" style={{...btn("#ef4444"),width:"100%",padding:"10px",fontSize:17,marginBottom:10}} onClick={()=>{if(!email||!pass)return;onLogin({name:mode==="register"?name:email.split("@")[0],email,id:email});}}>ENTRAR</button>
      <div style={{textAlign:"center",fontSize:15,color:"#4a5568",cursor:"pointer",marginBottom:8}} onClick={()=>setMode(m=>m==="login"?"register":"login")}>
        {mode==="login"?(es?"No tenes cuenta? Registrate":"No account? Register"):(es?"Ya tenes cuenta? Iniciá sesion":"Already have an account? Log in")}
      </div>
      <button className="hov" style={{...btn(),width:"100%",padding:"8px",fontSize:15}} onClick={onClose}>CANCELAR</button>
    </div>
  );
}

function EditExModal({editEx, btn, inp, es, onSave, onClose}) {
  const info = EX.find(e=>e.id===editEx.ex.id);
  const pat = PATS[info?.pattern];
  const initWeeks = () => {
    const w = [...(editEx.ex.weeks||[])];
    while(w.length<4) w.push({sets:"",reps:"",kg:"",note:""});
    return w.map(wk=>({sets:wk.sets||"",reps:wk.reps||"",kg:wk.kg||"",note:wk.note||""}));
  };
  const [sets, setSets] = useState(editEx.ex.sets||"3");
  const [reps, setReps] = useState(editEx.ex.reps||"8-10");
  const [kg, setKg] = useState(editEx.ex.kg||"");
  const [pause, setPause] = useState(editEx.ex.pause||90);
  const [weeks, setWeeks] = useState(initWeeks);

  const updW = (wi,field,val) => setWeeks(prev=>prev.map((w,i)=>i===wi?{...w,[field]:val}:w));
  const color = pat?.color||"#60a5fa";

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:125,overflowY:"auto"}} onClick={onClose}>
      <div style={{background:"#0e1018",margin:"20px 16px",borderRadius:16,padding:"20px 16px",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <span style={{fontSize:29}}>{pat?.icon}</span>
          <div style={{fontSize:21,fontWeight:800,flex:1}}>{es?info?.name:info?.nameEn}</div>
          <button className="hov" style={{...btn(),fontSize:22,padding:"4px 10px"}} onClick={onClose}>x</button>
        </div>

        <div style={{fontSize:13,fontWeight:700,letterSpacing:1.5,color:"#4a5568",marginBottom:8}}>CONFIGURACION BASE</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:14}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>SERIES</div>
            <input style={{...inp,padding:"8px 6px",fontSize:16,textAlign:"center"}} value={sets} onChange={e=>setSets(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>REPS</div>
            <input style={{...inp,padding:"8px 6px",fontSize:16,textAlign:"center"}} value={reps} onChange={e=>setReps(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>KG</div>
            <input style={{...inp,padding:"8px 6px",fontSize:16,textAlign:"center"}} value={kg} onChange={e=>setKg(e.target.value)} placeholder="-"/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>PAUSA</div>
            <input style={{...inp,padding:"8px 6px",fontSize:16,textAlign:"center"}} value={pause} onChange={e=>setPause(e.target.value)} placeholder="seg"/>
          </div>
        </div>

        <div style={{fontSize:13,fontWeight:700,letterSpacing:1.5,color:"#4a5568",marginBottom:8}}>PROGRESION SEMANAL</div>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{background:"#13151f",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
            <div style={{fontSize:15,fontWeight:700,color:color,marginBottom:8}}>SEMANA {wi+1}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>SERIES</div>
                <input style={{...inp,padding:"7px 6px",fontSize:16,textAlign:"center"}} value={w.sets} onChange={e=>updW(wi,"sets",e.target.value)} placeholder={sets}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>REPS</div>
                <input style={{...inp,padding:"7px 6px",fontSize:16,textAlign:"center"}} value={w.reps} onChange={e=>updW(wi,"reps",e.target.value)} placeholder={reps}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#4a5568",marginBottom:3}}>KG</div>
                <input style={{...inp,padding:"7px 6px",fontSize:16,textAlign:"center"}} value={w.kg} onChange={e=>updW(wi,"kg",e.target.value)} placeholder={kg||"-"}/>
              </div>
            </div>
            <input style={{...inp,padding:"6px 8px",fontSize:13}} value={w.note} onChange={e=>updW(wi,"note",e.target.value)} placeholder="Nota de la semana (opcional)..."/>
          </div>
        ))}

        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="hov" style={{...btn(),flex:1,padding:"10px"}} onClick={onClose}>CANCELAR</button>
          <button className="hov" style={{...btn("#ef4444"),flex:2,padding:"10px",fontSize:17}} onClick={()=>onSave({...editEx.ex,sets,reps,kg,pause,weeks})}>
            GUARDAR
          </button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(GymApp));
</script>
